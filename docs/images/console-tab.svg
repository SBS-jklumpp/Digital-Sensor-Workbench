    <text x="170" y="315" fill="#e6edf3">8.40,7.91,2.448,2.403,0.0020,0.0021</text>
    
    <text x="25" y="335" fill="#8b949e">[09:45:27.005]</text>
    <text x="140" y="335" fill="#7ee787">TX:</text>
    <text x="170" y="335" fill="#e6edf3">tsr</text>
    
