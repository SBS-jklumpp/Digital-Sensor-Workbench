    <text x="140" y="395" fill="#7ee787">TX:</text>
    <text x="170" y="395" fill="#e6edf3">tsr</text>
    
    <text x="25" y="415" fill="#8b949e">[09:45:29.538]</text>
    <text x="140" y="415" fill="#58a6ff">RX:</text>
    <text x="170" y="415" fill="#e6edf3">8.45,7.86,2.456,2.392,0.0026,0.0016</text>
