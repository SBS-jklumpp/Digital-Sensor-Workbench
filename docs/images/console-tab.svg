<![CDATA[<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#040810"/>
  
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" fill="#8b949e" font-size="12">Console Tab - Raw Serial I/O</text>
  
  <!-- Tab indicator -->
  <rect x="10" y="40" width="780" height="30" rx="4" fill="#161b22"/>
  <text x="30" y="59" fill="#8b949e" font-size="10">📋 Results</text>
  <text x="110" y="59" fill="#8b949e" font-size="10">📈 Live</text>
  <rect x="165" y="45" width="65" height="22" rx="3" fill="#00d4aa"/>
  <text x="177" y="60" fill="#040810" font-size="10" font-weight="bold">⌨ Console</text>
  <text x="245" y="59" fill="#8b949e" font-size="10">🔍 Sniffer</text>
  <text x="315" y="59" fill="#8b949e" font-size="10">📜 Log</text>
  <text x="365" y="59" fill="#8b949e" font-size="10">⚙ Setup</text>
  
  <!-- Quick Actions -->
  <rect x="10" y="80" width="780" height="40" rx="4" fill="url(#panelGrad)" stroke="#30363d"/>
  
  <rect x="25" y="92" width="60" height="18" rx="3" fill="#00d4aa"/>
  <text x="40" y="104" fill="#040810" font-size="9" font-weight="bold">Clear</text>
  
  <rect x="95" y="92" width="75" height="18" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="108" y="104" fill="#e6edf3" font-size="9">Copy Text</text>
  
  <rect x="180" y="92" width="85" height="18" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="191" y="104" fill="#e6edf3" font-size="9">Copy as CSV</text>
  
  <text x="290" y="104" fill="#8b949e" font-size="9">Lines:</text>
  <rect x="330" y="92" width="45" height="18" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="345" y="104" fill="#e6edf3" font-size="9">500</text>
  
  <rect x="395" y="91" width="14" height="14" rx="2" fill="#21262d" stroke="#30363d"/>
  <text x="415" y="103" fill="#8b949e" font-size="9">Auto-scroll</text>
  
  <rect x="510" y="91" width="14" height="14" rx="2" fill="#00d4aa"/>
  <text x="517" y="102" fill="#040810" font-size="8">✓</text>
  <text x="530" y="103" fill="#8b949e" font-size="9">Timestamps</text>
  
  <rect x="620" y="91" width="14" height="14" rx="2" fill="#21262d" stroke="#30363d"/>
  <text x="640" y="103" fill="#8b949e" font-size="9">Show Hex</text>
  
  <!-- Console Output Area -->
  <rect x="10" y="130" width="780" height="300" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="25" y="150" fill="#484f58" font-size="10">Console Output</text>
  
  <!-- Log entries -->
  <g font-family="Consolas, monospace" font-size="10">
    <text x="25" y="175" fill="#8b949e">[09:45:23.001]</text>
    <text x="140" y="175" fill="#7ee787">TX:</text>
    <text x="170" y="175" fill="#e6edf3">tsr</text>
    
