  <!-- Command Input Area -->
  <rect x="10" y="440" width="780" height="50" rx="4" fill="url(#panelGrad)" stroke="#30363d"/>
  
  <text x="25" y="468" fill="#8b949e" font-size="10">Command:</text>
  <rect x="90" y="455" width="500" height="25" rx="3" fill="#21262d" stroke="#00d4aa"/>
  <text x="100" y="472" fill="#e6edf3" font-family="Consolas" font-size="11">tsr</text>
  <text x="120" y="472" fill="#58a6ff">|</text>
  
  <rect x="600" y="455" width="60" height="25" rx="3" fill="#00d4aa"/>
  <text x="617" y="472" fill="#040810" font-size="10" font-weight="bold">Send</text>
  
  <rect x="670" y="455" width="50" height="25" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="679" y="472" fill="#e6edf3" font-size="10">+\r\n</text>
  
  <rect x="730" y="455" width="50" height="25" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="739" y="472" fill="#e6edf3" font-size="10">+\r</text>
  
  <!-- Legend -->
  <rect x="600" y="135" width="180" height="75" rx="4" fill="#21262d"/>
  <text x="615" y="155" fill="#8b949e" font-size="10" font-weight="bold">Color Legend</text>
  <text x="615" y="175" fill="#7ee787" font-size="9">TX: Transmitted commands</text>
  <text x="615" y="190" fill="#58a6ff" font-size="9">RX: Received responses</text>
  <text x="615" y="205" fill="#f0883e" font-size="9">WARN: Warnings/errors</text>
</svg>]]>